apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: public.ecr.aws/aws-containers/retail-store-sample-orders:0.8.5
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/ordersdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "dbadmin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "BedrockMySQL2025!"
        - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
          value: "com.mysql.cj.jdbc.Driver"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        resources:
          requests:
            cpu: 128m
            memory: 512Mi
          limits:
            cpu: 512m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: retail-app
spec:
  selector:
    app: orders
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        image: public.ecr.aws/aws-containers/retail-store-sample-catalog:0.8.5
        ports:
        - containerPort: 8080
        env:
        - name: DB_ENDPOINT
          value: "postgresql:5432"
        - name: DB_READ_ENDPOINT
          value: "postgresql:5432"
        - name: DB_NAME
          value: "catalogdb"
        - name: DB_USER
          value: "dbadmin"
        - name: DB_PASSWORD
          value: "BedrockPG2025!"
        resources:
          requests:
            cpu: 128m
            memory: 256Mi
          limits:
            cpu: 512m
            memory: 512Mi
