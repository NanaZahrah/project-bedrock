apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: public.ecr.aws/aws-containers/retail-store-sample-orders:0.2.0
        ports:
        - containerPort: 8080
        env:
        - name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
          value: "mysql"
        - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
          value: "mysql:3306"
        - name: RETAIL_ORDERS_PERSISTENCE_NAME
          value: "ordersdb"
        - name: RETAIL_ORDERS_PERSISTENCE_USER
          value: "dbadmin"
        - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
          value: "BedrockMySQL2025!"
        - name: RETAIL_ORDERS_MESSAGING_PROVIDER
          value: "rabbitmq"
        - name: RETAIL_ORDERS_MESSAGING_ENDPOINT
          value: "rabbitmq:5672"
        resources:
          requests:
            cpu: 128m
            memory: 512Mi
          limits:
            cpu: 512m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: retail-app
spec:
  selector:
    app: orders
  ports:
  - port: 8080
    targetPort: 8080
