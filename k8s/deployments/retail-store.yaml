---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: retail-app
  labels:
    app: ui
    Project: karatu-2025-capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: public.ecr.aws/aws-containers/retail-store-sample-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENDPOINTS_CATALOG
              value: "http://catalog:8080"
            - name: ENDPOINTS_CARTS
              value: "http://carts:8080"
            - name: ENDPOINTS_ORDERS
              value: "http://orders:8080"
            - name: ENDPOINTS_CHECKOUT
              value: "http://checkout:8080"
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 512m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: retail-app
spec:
  selector:
    app: ui
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: retail-app
  labels:
    app: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: public.ecr.aws/aws-containers/retail-store-sample-catalog:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_ENDPOINT
              value: "bedrock-postgres.c6hg62a8e3bk.us-east-1.rds.amazonaws.com"
            - name: DB_NAME
              value: "catalogdb"
            - name: DB_USER
              value: "dbadmin"
            - name: DB_PASSWORD
              value: "BedrockPG2025!"
            - name: DB_READ_ENDPOINT
              value: "bedrock-postgres.c6hg62a8e3bk.us-east-1.rds.amazonaws.com"
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 512m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: retail-app
spec:
  selector:
    app: catalog
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: retail-app
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: public.ecr.aws/aws-containers/retail-store-sample-orders:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://bedrock-mysql.c6hg62a8e3bk.us-east-1.rds.amazonaws.com:3306/ordersdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "dbadmin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "BedrockMySQL2025!"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
          resources:
            requests:
              cpu: 128m
              memory: 512Mi
            limits:
              cpu: 512m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: retail-app
spec:
  selector:
    app: orders
  ports:
    - port: 8080
      targetPort: 8080
